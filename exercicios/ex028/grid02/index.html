<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout na prática</title>
    <style>
        /* 
       Em GRID LAYOUT

       Sempre que ajustar posicionamento de itens e conteúdos, levar em consideração regra abaixo:

        ALIGN (items ou content): alinhamento no sentido VERTICAL (transverso do eixo principal)

        JUSTIFY (items ou content): alinhamento no sentido HORIZONTAL (eixo principal)
       */

        div.container {
            border: 3px solid  blue;
            height: 250px;
            display: grid;

/*grid-template: 
    GRID-TEMPLATE-ROWS / GRID-TEMPLATE-COLUMNS
    grid-template: repeat(3, 100px) / repeat(3, auto);
    */
            grid-template-rows: auto auto auto; 
            grid-template-columns: auto auto auto;
            gap: 10px;
            
            align-items: normal; /* place-items: ALIGN JUSTIFY*/
            justify-items: normal;
            align-content: normal; /* place-content: ALIGN JUSTIFY*/
            justify-content: normal;
       }

       div.item {
            border: 1px solid red;
            padding: 5px;
       }

    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
    </div>
</body>
</html>
