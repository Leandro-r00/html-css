<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px; 
        /*
        SHORT HANDS BORDER
        border: width style color; incluir os valores na sequencia      
        */    
            border: 10px solid darkcyan;

        /*
        SHORT HANDS PADDING
        padding: top rigth bottom left; incluir os valores na sequencia
        caso todos valores sejam iguais, então inclua px uma única vez    
        */ 
            padding: 10px 10px 10px 10px;

        /*
        SHORT HANDS MARGIN
        margin: top rigth bottom left; incluir os valores na sequencia 
        caso todos valores sejam iguais, então inclua px uma única vez     
        */ 
            margin: 10px auto 10px auto;
        
        /*
        SHORT HANDS OUTLINE
        outline: width style color; incluir os valores na sequencia      
        */ 
            outline: 5px dashed darkred;    
        }

        a {
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
